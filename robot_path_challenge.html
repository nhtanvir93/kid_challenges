<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Path Challenge</title>
    <link
      rel="icon"
      type="image/png"
      href="./assets/images/robot_path_challenge/robot.png"
    />
    <link rel="stylesheet" href="./assets/css/robot_path_challenge.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="navbar-left">
          <div class="robot-icon"></div>
          <div class="navbar-brand">
            <p class="font-fredoka brand-title">Robot Path Challenge</p>
            <p class="font-fredoka game-level">
              Level : <span id="level">1</span>
            </p>
          </div>
        </div>
        <div class="navbar-right">
          <div class="trophy-score-container">
            <div class="trophy-icon"></div>
            <span id="trophy-score" class="font-fredoka">0</span>
          </div>
        </div>
      </nav>
    </header>
    <main id="content">
      <div class="hint-container">
        <div class="light-bulb-icon"></div>
        <p class="font-fredoka hint">Move right 3 times to reach the star!</p>
      </div>
      <div id="path-grid"></div>
      <div class="action-btns">
        <button class="btn reset-btn">
          <div class="reset-icon"></div>
          Reset
        </button>
        <button class="btn run-btn">
          <div class="play-icon"></div>
          Run
        </button>
      </div>
      <div class="command-and-program">
        <div class="options">
          <div class="option-title active" id="command">Command</div>
          <div class="option-title" id="program">Program</div>
        </div>
        <div id="command-panel" class="option-panel">
          <div class="command-container">
            <button class="btn" id="btn-up">
              <div class="arrow-up"></div>
              Move Up
            </button>
            <button class="btn" id="btn-left">
              <div class="arrow-left"></div>
              Move Left
            </button>
            <button class="btn" id="btn-down">
              <div class="arrow-down"></div>
              Move Down
            </button>
            <button class="btn" id="btn-right">
              <div class="arrow-right"></div>
              Move Right
            </button>
          </div>
        </div>
        <div id="program-panel" class="hide option-panel">
          <div id="move-list" class="program-container"></div>
        </div>
      </div>
    </main>
    <script src="./assets/js/robot_path_challenge.js"></script>
  </body>
</html>
